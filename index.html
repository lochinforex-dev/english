<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lexicon 3000</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');
        .cyber { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="bg-[#020617] text-white">

    <div class="fixed top-5 right-5 glass p-3 rounded-2xl border-cyan-500/50 flex items-center gap-2">
        <span class="h-2 w-2 rounded-full bg-cyan-500 animate-pulse"></span>
        <span class="cyber text-[10px] text-cyan-400">USERS: 5,742</span>
    </div>

    <div id="auth" class="min-h-screen flex items-center justify-center p-4">
        <div class="glass max-w-sm w-full p-8 rounded-[2rem] text-center">
            <h1 class="cyber text-2xl mb-6 bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent">LEXICON 3000</h1>
            <input id="name" type="text" placeholder="Ism" class="w-full p-4 mb-3 rounded-xl bg-slate-900 border border-white/10 outline-none focus:border-cyan-500">
            <input id="surname" type="text" placeholder="Familiya" class="w-full p-4 mb-6 rounded-xl bg-slate-900 border border-white/10 outline-none focus:border-cyan-500">
            <button onclick="start()" class="w-full py-4 bg-cyan-600 rounded-xl cyber text-xs hover:bg-cyan-500 transition-all">START</button>
        </div>
    </div>

    <div id="game" class="hidden min-h-screen flex flex-col items-center justify-center p-6">
        <div class="w-full max-w-lg">
            <div class="flex justify-between items-end mb-4">
                <span id="p-name" class="text-cyan-400 font-bold"></span>
                <span id="timer" class="cyber text-4xl text-yellow-400">4.0</span>
            </div>
            <div class="h-1 w-full bg-slate-800 rounded-full mb-10 overflow-hidden">
                <div id="bar" class="h-full bg-cyan-500 w-full transition-all duration-100"></div>
            </div>
            <h2 id="word" class="text-5xl font-black text-center mb-12 uppercase tracking-tighter">APPLE</h2>
            <div id="options" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>
    </div>

    <script>
        let dictionary = [
            {q: "Success", c: "Muvaffaqiyat", o: ["Muvaffaqiyat", "Xato", "Baxt", "Boylik"]},
            {q: "Ability", c: "Qobiliyat", o: ["Qobiliyat", "Kuch", "Bilim", "Imkon"]},
            // Shuni 3000 tagacha davom ettirish mantiqi bor
        ];
        let current = 0, time = 40, timer;

        function start() {
            const n = document.getElementById('name').value;
            const s = document.getElementById('surname').value;
            if(!n || !s) return alert("To'ldiring!");
            document.getElementById('p-name').innerText = n + " " + s;
            document.getElementById('auth').classList.add('hidden');
            document.getElementById('game').classList.remove('hidden');
            load();
        }

        function load() {
            clearInterval(timer);
            time = 40;
            const q = dictionary[current % dictionary.length];
            document.getElementById('word').innerText = q.q;
            const optDiv = document.getElementById('options');
            optDiv.innerHTML = '';
            
            q.o.sort(()=>Math.random()-0.5).forEach(o => {
                const b = document.createElement('button');
                b.className = "p-5 glass rounded-2xl hover:bg-cyan-600/20 text-sm";
                b.innerText = o;
                b.onclick = () => { if(o === q.c) { current++; load(); } else { alert('Xato! Ball: ' + current); location.reload(); } };
                optDiv.appendChild(b);
            });

            timer = setInterval(() => {
                time--;
                document.getElementById('timer').innerText = (time/10).toFixed(1);
                document.getElementById('bar').style.width = (time/40)*100 + "%";
                if(time <= 0) { alert('Vaqt tugadi! Ball: ' + current); location.reload(); }
            }, 100);
        }
    </script>
</body>
</html>
